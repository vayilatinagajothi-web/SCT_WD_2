<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch Web Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 450px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
        }

        #display {
            font-size: 48px;
            font-weight: bold;
            margin: 25px 0;
            color: #2a5298;
            letter-spacing: 2px;
        }

        button {
            padding: 12px 20px;
            margin: 6px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .start { background: #28a745; }
        .pause { background: #ffc107; color: #333; }
        .reset { background: #dc3545; }
        .lap   { background: #007bff; }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        h3 {
            margin-top: 25px;
            color: #333;
        }

        #laps {
            margin-top: 10px;
            text-align: left;
            max-height: 280px;
            overflow-y: auto;
            padding: 0;
            list-style: none;
        }

        #laps li {
            background: #f2f2f2;
            margin: 8px 0;
            padding: 10px;
            border-radius: 6px;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⏱ Stopwatch</h1>

    <div id="display">00:00:00.000</div>

    <button class="start" id="startBtn">Start</button>
    <button class="pause" id="pauseBtn">Pause</button>
    <button class="lap" id="lapBtn">Lap</button>
    <button class="reset" id="resetBtn">Reset</button>

    <h3>Lap Times</h3>
    <ul id="laps"></ul>
</div>

<script>
    let startTime = 0;
    let elapsedTime = 0;
    let timer = null;
    let running = false;
    let previousLapTime = 0;
    let lapCount = 0;

    const display = document.getElementById("display");
    const lapsList = document.getElementById("laps");

    function formatTime(ms) {
        let hours = Math.floor(ms / 3600000);
        let minutes = Math.floor((ms % 3600000) / 60000);
        let seconds = Math.floor((ms % 60000) / 1000);
        let milliseconds = ms % 1000;

        return (
            String(hours).padStart(2, '0') + ":" +
            String(minutes).padStart(2, '0') + ":" +
            String(seconds).padStart(2, '0') + "." +
            String(milliseconds).padStart(3, '0')
        );
    }

    function updateDisplay() {
        elapsedTime = Date.now() - startTime;
        display.innerText = formatTime(elapsedTime);
    }

    function startTimer() {
        if (running) return;

        running = true;
        startTime = Date.now() - elapsedTime;
        timer = setInterval(updateDisplay, 10);
    }

    function pauseTimer() {
        if (!running) return;

        elapsedTime = Date.now() - startTime;
        clearInterval(timer);
        running = false;

        display.innerText = formatTime(elapsedTime);
    }

    function resetTimer() {
        clearInterval(timer);
        timer = null;
        running = false;
        elapsedTime = 0;
        previousLapTime = 0;
        lapCount = 0;

        display.innerText = "00:00:00.000";
        lapsList.innerHTML = "";
    }

    function recordLap() {
        const currentTime = running
            ? Date.now() - startTime
            : elapsedTime;

        if (currentTime === 0) return;

        lapCount++;

        const interval = currentTime - previousLapTime;

        const li = document.createElement("li");
        li.innerHTML = `
            <strong>Lap ${lapCount}</strong> |
            Total: <strong>${formatTime(currentTime)}</strong> |
            Interval: <strong>${formatTime(interval)}</strong>
        `;

        lapsList.prepend(li);

        previousLapTime = currentTime;
    }

    // Event Listeners
    document.getElementById("startBtn").addEventListener("click", startTimer);
    document.getElementById("pauseBtn").addEventListener("click", pauseTimer);
    document.getElementById("lapBtn").addEventListener("click", recordLap);
    document.getElementById("resetBtn").addEventListener("click", resetTimer);

    // Keyboard Shortcuts
    document.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
            e.preventDefault();
            running ? pauseTimer() : startTimer();
        }

        if (e.key.toLowerCase() === "l") {
            recordLap();
        }

        if (e.key.toLowerCase() === "r") {
            resetTimer();
        }
    });
</script>

</body>
</html>
